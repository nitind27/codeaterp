# Nginx config for erp.codeatinfotech.com
# Place this in /etc/nginx/sites-available/erp.codeatinfotech.com
# Then: sudo ln -s /etc/nginx/sites-available/erp.codeatinfotech.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name erp.codeatinfotech.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name erp.codeatinfotech.com;

    ssl_certificate     /etc/letsencrypt/live/erp.codeatinfotech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.codeatinfotech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Socket.io — must come BEFORE the general / location ──
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep connection alive for long-polling fallback
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 60s;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # ── Next.js app ──
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_buffering     off;
    }
}
